<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー一括インポート</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0">ユーザー一括インポート（V4対応版）</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-warning small mb-3">
                    <strong>⚠ 使用前の注意：</strong><br>
                    ① Firestoreルールを一時的に読み書きOKに変更してください<br>
                    ② インポート完了後、必ずルールを元に戻してください<br>
                    ③ settings.json への新グループ追加もお忘れなく
                </div>
                <p class="text-muted small mb-3">
                    JSON形式でユーザーデータを入力してください。<br>
                    <strong>※ loginId、authUid、agreedTermsVersion、updatedAt はシステムが自動付与します。</strong>
                </p>
                <div class="mb-3">
                    <textarea id="import-data" class="form-control font-monospace" rows="16" style="font-size: 0.8rem;">[
  { "id": "u193", "name": "unregister_u193", "group": "QQQQ", "role": "leader", "icon": "👤" },
  { "id": "u194", "name": "unregister_u194", "group": "QQQQ", "role": "member", "icon": "🐶" },

  { "id": "u195", "name": "unregister_u195", "group": "RRRR", "role": "leader", "icon": "👤" },
  { "id": "u196", "name": "unregister_u196", "group": "RRRR", "role": "member", "icon": "🐶" },

  { "id": "u197", "name": "unregister_u197", "group": "SSSS", "role": "leader", "icon": "👤" },
  { "id": "u198", "name": "unregister_u198", "group": "SSSS", "role": "member", "icon": "🐶" },

  { "id": "u199", "name": "unregister_u199", "group": "TTTT", "role": "leader", "icon": "👤" },
  { "id": "u200", "name": "unregister_u200", "group": "TTTT", "role": "member", "icon": "🐶" },

  { "id": "u201", "name": "unregister_u201", "group": "UUUU", "role": "leader", "icon": "👤" },
  { "id": "u202", "name": "unregister_u202", "group": "UUUU", "role": "member", "icon": "🐶" },

  { "id": "u203", "name": "unregister_u203", "group": "VVVV", "role": "leader", "icon": "👤" },
  { "id": "u204", "name": "unregister_u204", "group": "VVVV", "role": "member", "icon": "🐶" },

  { "id": "u205", "name": "unregister_u205", "group": "WWWW", "role": "leader", "icon": "👤" },
  { "id": "u206", "name": "unregister_u206", "group": "WWWW", "role": "member", "icon": "🐶" },

  { "id": "u207", "name": "unregister_u207", "group": "XXXX", "role": "leader", "icon": "👤" },
  { "id": "u208", "name": "unregister_u208", "group": "XXXX", "role": "member", "icon": "🐶" },

  { "id": "u209", "name": "unregister_u209", "group": "YYYY", "role": "leader", "icon": "👤" },
  { "id": "u210", "name": "unregister_u210", "group": "YYYY", "role": "member", "icon": "🐶" },

  { "id": "u211", "name": "unregister_u211", "group": "ZZZZ", "role": "leader", "icon": "👤" },
  { "id": "u212", "name": "unregister_u212", "group": "ZZZZ", "role": "member", "icon": "🐶" }
]</textarea>
                </div>
                <button id="import-btn" class="btn btn-primary w-100 fw-bold">インポート実行</button>
                
                <div id="status" class="mt-3"></div>
                
                <div id="log" class="mt-2 small text-muted" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWy_BjB9tr02viCSfAx93qeJyX4G0e2iw",
            authDomain: "keep-under-control.firebaseapp.com",
            projectId: "keep-under-control",
            storageBucket: "keep-under-control.firebasestorage.app",
            messagingSenderId: "999632394190",
            appId: "1:999632394190:web:085efbde0239f098c27d9f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const safeHexEncode = (str) => {
            return Array.from(new TextEncoder().encode(str))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const logDiv = document.getElementById('log');
        const addLog = (msg) => {
            logDiv.innerHTML += msg + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        document.getElementById('import-btn').addEventListener('click', async () => {
            const dataInput = document.getElementById('import-data').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('import-btn');
            logDiv.innerHTML = '';
            
            if (!dataInput.trim()) {
                statusDiv.innerHTML = '<div class="alert alert-danger">データを入力してください</div>';
                return;
            }

            try {
                const users = JSON.parse(dataInput);
                if (!Array.isArray(users)) throw new Error("データは配列（[ ]で囲まれた形式）である必要があります");

                btn.disabled = true;
                statusDiv.innerHTML = '<div class="alert alert-info">インポート処理中... 画面を閉じないでください。</div>';

                let successCount = 0;
                let skipCount = 0;

                for (const user of users) {
                    if (!user.id || !user.name) {
                        addLog(`⚠ スキップ: ${JSON.stringify(user)} (IDまたは名前なし)`);
                        skipCount++;
                        continue;
                    }

                    // 現行仕様に合わせた自動補完
                    const userData = {
                        id: user.id,
                        name: user.name,
                        group: user.group || "未設定",
                        role: user.role || "member",
                        icon: user.icon || "👤",
                        loginId: safeHexEncode(user.name),
                        authUid: "",
                        agreedTermsVersion: 0,
                        fcmToken: "",
                        updatedAt: serverTimestamp()
                    };

                    await setDoc(doc(db, "users", user.id), userData);
                    addLog(`✅ ${user.id} (${user.name}) → ${user.group}`);
                    successCount++;
                }

                statusDiv.innerHTML = `<div class="alert alert-success fw-bold">✅ ${successCount}件 登録完了${skipCount > 0 ? ` / ${skipCount}件 スキップ` : ''}</div>`;

            } catch (error) {
                console.error("インポートエラー:", error);
                statusDiv.innerHTML = `<div class="alert alert-danger"><strong>エラー:</strong><br>${error.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
